<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 420px;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #2563eb;
      line-height: 1;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0.75rem 0 0.5rem;
    }
    p {
      color: #64748b;
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>Why don't you try the interactive Python editor on the <a href="/">home page</a>?</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
